name: Build DEB Package

on:
  push:
    branches: [ "main" ]
  # 允许在 GitHub Actions 页面手动点击运行
  workflow_dispatch: 

jobs:
  build-deb:
    name: Build Codex Desktop DEB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 p7zip-full curl unzip build-essential fakeroot dpkg-dev

      - name: Generate the local Electron app
        env:
          CODEX_ENFORCE_CRITICAL_PATCHES: "0"
        run: make build-app-fresh

      - name: Build DEB package
        run: make deb

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-desktop-linux-deb
          path: dist/*.deb
          if-no-files-found: error
